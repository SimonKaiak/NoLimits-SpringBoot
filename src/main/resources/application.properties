# ============================================================
# CONFIGURACIÓN PRINCIPAL DE LA APLICACIÓN
# ============================================================

spring.application.name=NoLimits

# ============================================================
# BASE DE DATOS (PRODUCCIÓN - RENDER)
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=require

# ============================================================
# JPA / HIBERNATE
# ============================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# ============================================================
# SERVIDOR
# ============================================================

server.address=0.0.0.0
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ============================================================
# COOKIES
# ============================================================

server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

# ============================================================
# SWAGGER
# ============================================================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ============================================================
# ACTUATOR
# ============================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================

logging.level.org.hibernate=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.orm.jpa=INFO

# ============================================================
# JWT
# ============================================================

security.jwt.secret=${SECURITY_JWT_SECRET:nolimits_jwt_secret_super_segura_2026_123456}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:3600000}

# ============================================================
# ADMIN
# ============================================================

app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}